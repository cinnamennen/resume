name: Build Resume

on:
  push:
    paths:
      - 'cv/**'
  pull_request:
    paths:
      - 'cv/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: texlive/texlive:latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6

    - name: Install fonts
      run: |
        apt update
        apt install --yes \
          fonts-roboto \
          fonts-adobe-sourcesans3 \
          ;
        luaotfload-tool --update

    - name: Compile resume
      run: TEXINPUTS="./vendor/awesome-cv//:" lualatex resume.tex
      working-directory: cv

    - name: Upload PDF
      uses: actions/upload-artifact@v6
      with:
        name: resume
        path: cv/resume.pdf

    - name: Create release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: cv/resume.pdf
